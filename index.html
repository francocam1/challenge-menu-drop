<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@100..900&display=swap"   rel="stylesheet">
  
  <title>Frontend Mentor | Intro section with dropdown navigation</title>

  
</head>
<body>
  <header class="header">
    
    <div class="header__wrapper">
      <div class="header__logo">
        <img src="images/logo.svg" alt="">
      </div>
      <nav class="header__nav">
        <ul class="nav-menu">
          
          <li class="nav-menu-btn">
            <button>
              <span>Features</span>
              <img src="images/icon-arrow-down.svg" alt="">
            </button>
          
        
          <ul class="sub-menu">
            <li>
                <a href="">
                <img src="images/icon-todo.svg" alt="">
                <span>Todo List</span>
                </a>
            </li>
            <li>
                <a href="">
                <img src="images/icon-calendar.svg" alt="">
                <span>Calendar</span>
                </a>
            </li>
            <li>
                <a href="">
                <img src="images/icon-reminders.svg" alt="">
                <span>Reminders</span>
                </a>
            </li>
            <li>
                <a href="">
                <img src="images/icon-planning.svg" alt="">
                <span>Planning</span>
                </a>
            </li>
          </ul>

          </li>
      
        </ul>
        <ul><h4>Company</h4>
            <li><a href="">History</a></li>
            <li><a href="">Our Team</a></li>
            <li><a href="">Blog</a></li>
        </ul>
        <ul><li><a href="">Careers</a></li></ul>
        <ul><li><a href="">About</a></li></ul>
        <div class="header__nav-btns">
          <button>Login</button>
          <button>Register</button>
        </div>
      </nav>
      <button class="header__btn-menu"><img src="images/icon-menu.svg" alt=""></button>
      
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero__wrapper">
        <div class="hero__container-img">
          <img src="images/image-hero-mobile.png" alt="">
        </div>

        <div class="hero__title">
          <h1>Make remote work</h1>
          <p>
            Get your team in sync, no matter your location. Streamline processes,
            create team rituals, and watch productivity soar.
          </p>
          <button>Learn more</button>
          <div class="hero__branding">
            <img src="./images/client-databiz.svg" alt="">
            <img src="./images/client-audiophile.svg" alt="">
            <img src="./images/client-meet.svg" alt="">
            <img src="./images/client-maker.svg" alt="">
            
          </div>
        </div>
      </div>
      
    </section>
  </main>
  
  <script src="scripts.js"></script>
</body>
</html>
